apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: open-terminal
      app.kubernetes.io/instance: open-terminal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-terminal
        app.kubernetes.io/instance: open-terminal
    spec:
      serviceAccountName: open-terminal
      enableServiceLinks: false
      containers:
        - name: open-terminal
          image: ghcr.io/stephanme/custom-open-terminal
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OPEN_TERMINAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-terminal-secrets
                  key: api-key
            - name: OPEN_TERMINAL_MULTI_USER
              value: "false"
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: open-terminal-secrets
                  key: github-token
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: home
              mountPath: /home/user
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: home
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: open-terminal
  namespace: ai
spec:
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/instance: open-terminal
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: open-terminal
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: open-terminal-reader
rules:
  # All core resources except secrets
  - apiGroups: [""]
    resources:
      - bindings
      - componentstatuses
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - namespaces/status
      - nodes
      - nodes/log
      - nodes/metrics
      - nodes/proxy
      - nodes/status
      - persistentvolumeclaims
      - persistentvolumeclaims/status
      - persistentvolumes
      - persistentvolumes/status
      - pods
      - pods/log
      - pods/portforward
      - pods/proxy
      - pods/status
      - replicationcontrollers
      - replicationcontrollers/scale
      - replicationcontrollers/status
      - resourcequotas
      - resourcequotas/status
      - serviceaccounts
      - services
      - services/proxy
      - services/status
    verbs: ["get", "list", "watch"]
  # All non-core API groups (secrets only exist in core group "")
  - apiGroups:
      - admissionregistration.k8s.io
      - apiextensions.k8s.io
      - apiregistration.k8s.io
      - apps
      - autoscaling
      - batch
      - certificates.k8s.io
      - coordination.k8s.io
      - discovery.k8s.io
      - events.k8s.io
      - flowcontrol.apiserver.k8s.io
      - helm.cattle.io
      - metrics.k8s.io
      - networking.k8s.io
      - node.k8s.io
      - policy
      - rbac.authorization.k8s.io
      - scheduling.k8s.io
      - storage.k8s.io
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: open-terminal-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: open-terminal-reader
subjects:
  - kind: ServiceAccount
    name: open-terminal
    namespace: ai
