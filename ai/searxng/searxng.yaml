apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
      app.kubernetes.io/instance: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/instance: searxng
    spec:
      enableServiceLinks: false
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
            - name: cache
              mountPath: /var/cache/searxng
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: searxng-config
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/instance: searxng
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: searxng
  namespace: ai
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`search.fritz.box`)
      services:
        - name: searxng
          port: 8080
